<svg viewBox="0 0 96 96" width="96" height="96" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background -->
  <rect width="96" height="96" fill="#1C2E4A" rx="12"/>
  <!-- Bar chart — 4 ascending parchment bars -->
  <rect x="8"  y="68" width="13" height="14" rx="2" fill="#D8CBAD" opacity="0.40"/>
  <rect x="26" y="56" width="13" height="26" rx="2" fill="#D8CBAD" opacity="0.55"/>
  <rect x="44" y="42" width="13" height="40" rx="2" fill="#D8CBAD" opacity="0.70"/>
  <rect x="62" y="52" width="13" height="30" rx="2" fill="#D8CBAD" opacity="0.55"/>
  <!-- Signal bar — tallest, highlighted, this is the margin -->
  <rect x="74" y="24" width="6" height="58" rx="2" fill="#E63329"/>
  <!-- Pin mark: ring + inner dot -->
  <circle cx="77" cy="18" r="8" fill="none" stroke="#E63329" stroke-width="2.5"/>
  <circle cx="77" cy="18" r="3" fill="#FBF6EC"/>
  <!-- Baseline rule -->
  <line x1="6" y1="84" x2="90" y2="84" stroke="#C8A24B" stroke-width="1" opacity="0.4"/>
</svg>
